<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spyros Todo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">      
</head>
<body>
    <div id="card">
        <div id="sidebar">
            <div id="sidebar-header" class="no-select clickable">
                <h1>Lists</h1>
                <img src="assets/add_circle_big.svg" alt="Add-list" draggable="false">
            </div>
            <div class="sidebar-divider"></div>
            <div id="all-tasks"><img src="assets/all_tasks.svg" alt="" >All tasks</div>
            <div id="sidebar-content">
            </div>
        </div>
        <div id="centre-window">
            <h1 id="centre-header">
                <div id="list-header">Tasks</div>
                <div id="list-config" class="no-select">
                    <button id="list-config-btn" class="clickable"><img src="./assets/config.svg" alt="" draggable="false"></button>
                    <div id="list-config-menu">
                        <button class="list-config-option clickable" id="show-completed-btn">Show Completed</button>
                        <button class="list-config-option clickable" id="delete-list-btn">Delete List</button>
                    </div>
                </div>
            </h1>
            <div id="task-input"></div>
            <div id="tasks">
                <div id="incomplete-tasks">
                    <h2 id="incomplete-tasks-header">To-do</h2>
                    <div id="incomplete-tasks-content"></div>
                </div>
                <div id="completed-tasks">
                    <h2 id="completed-tasks-header">Completed</h2>
                    <div id="completed-tasks-content"></div>
                </div>
            </div>
        </div>
        <div id="task-preview">
            <div id="task-header">
                <h1 id="task-header-top"></h1>
                <div id="task-header-bottom"></div>
            </div>
            <div id="task-content"></div>
        </div>
    </div>
    <dialog id="newListDialog">
        <form method="dialog" id="list-form">
            <label for="listName"></label>
            <input type="text" id="list-name" name="list-name" required>
            <button type="submit" id="submit-list">Add</button>
        </form>
    </dialog>
</body>
</html>
